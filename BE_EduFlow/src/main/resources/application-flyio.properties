# ==============================================================================
# EduFlow Backend – Fly.io Profile
# ==============================================================================
# Activated via: SPRING_PROFILES_ACTIVE=flyio
# Credentials are injected via Fly Secrets (environment variables)
# ==============================================================================

spring.application.name=backend

# Server
server.port=${SERVER_PORT:8888}

# Database – Override via Fly Secrets
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/eduflow_db?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# Mail – Override via Fly Secrets
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Logging (less verbose for production)
logging.level.root=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Misc
spring.main.banner-mode=off
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
spring.thymeleaf.check-template-location=false

# Actuator health endpoint for Fly.io health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# fly.toml app configuration file generated for eduflow-fe-dev on 2026-06-23T08:05:00+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'eduflow-fe-dev'
primary_region = 'sin'

[build]

[env]
  BACKEND_URL = 'https://eduflow-be-dev.fly.dev'
  SERVER_PORT = '8080'
  SPRING_PROFILES_ACTIVE = 'flyio'
  TZ = 'Asia/Ho_Chi_Minh'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

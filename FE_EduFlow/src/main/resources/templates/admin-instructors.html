<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" th:href="@{/img/icon.png}">
    <title>Manage Instructors - Edutree Admin</title>

    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/vendor/icofont/icofont.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/cdn.jsdelivr.net/npm/bootstrap-icons%401.7.1/font/bootstrap-icons.css}">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: admin_header}"></div>

<section class="py-3 border-bottom bg-white shadow-sm">
    <div class="container">
        <h4 class="mb-0">Instructor Accounts</h4>
        <p class="text-muted mb-0">Tạo và quản lý tài khoản instructor</p>
    </div>
</section>

<div class="pt-5 pb-5">
    <div class="container">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card border-light">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-person-plus"></i> Create Instructor Account</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/instructors/create}" th:object="${newInstructor}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" th:field="*{fullName}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" th:field="*{username}" placeholder="Để trống sẽ dùng email" >
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" th:field="*{password}" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Create Instructor</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card border-light">
                    <div class="card-header">
                        <h5 class="mb-0">Existing Instructors</h5>
                    </div>
                    <div class="p-0 card-body">
                        <div class="table-responsive border-0">
                            <table class="mb-0 text-nowrap table">
                                <thead class="table-light">
                                <tr>
                                    <th scope="col" class="border-0">Full Name</th>
                                    <th scope="col" class="border-0">Username</th>
                                    <th scope="col" class="border-0">Email</th>
                                    <th scope="col" class="border-0">Status</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:if="${instructors.isEmpty()}">
                                    <td colspan="4" class="text-center text-muted py-4">Chưa có instructor nào</td>
                                </tr>
                                <tr th:each="instructor : ${instructors}">
                                    <td th:text="${instructor.fullName}">-</td>
                                    <td th:text="${instructor.username}">-</td>
                                    <td th:text="${instructor.email}">-</td>
                                    <td>
                                            <span class="badge" th:classappend="${instructor.status} ? 'bg-success' : 'bg-secondary'"
                                                  th:text="${instructor.status} ? 'Active' : 'Inactive'">Active</span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="py-4 bg-white border-top text-center small text-muted">
    <div class="container">©2026 Edutree Admin Panel</div>
</footer>

<script th:src="@{/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

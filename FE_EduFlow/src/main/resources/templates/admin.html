<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" th:href="@{/img/icon.png}">
    <title>Admin Dashboard - Edutree</title>

    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/vendor/icofont/icofont.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/cdn.jsdelivr.net/npm/bootstrap-icons%401.7.1/font/bootstrap-icons.css}">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: admin_header}"></div>

<section class="py-3 border-bottom bg-white shadow-sm">
    <div class="container">
        <h4 class="mb-0">System Monitoring</h4>
        <p class="text-muted mb-0">Tổng quan giám sát toàn hệ thống</p>
    </div>
</section>

<div class="pt-5 pb-5">
    <div class="container">
        <div class="row g-4">
            <div class="col-lg-3 col-md-6 col-sm-12">
                <div class="card border-light h-100">
                    <div class="card-body">
                        <span class="fs-6 text-uppercase fw-semi-bold text-muted">Students</span>
                        <h2 class="mt-3 fw-bold mb-0" th:text="${dashboard.totalStudents}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-12">
                <div class="card border-light h-100">
                    <div class="card-body">
                        <span class="fs-6 text-uppercase fw-semi-bold text-muted">Instructors</span>
                        <h2 class="mt-3 fw-bold mb-0" th:text="${dashboard.totalInstructors}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-12">
                <div class="card border-light h-100">
                    <div class="card-body">
                        <span class="fs-6 text-uppercase fw-semi-bold text-muted">Courses</span>
                        <h2 class="mt-3 fw-bold mb-0" th:text="${dashboard.totalCourses}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-12">
                <div class="card border-light h-100">
                    <div class="card-body">
                        <span class="fs-6 text-uppercase fw-semi-bold text-muted">Admins</span>
                        <h2 class="mt-3 fw-bold mb-0" th:text="${dashboard.totalAdmins}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 col-md-6 col-sm-12">
                <div class="card border-light h-100">
                    <div class="card-body">
                        <span class="fs-6 text-uppercase fw-semi-bold text-muted">Total Orders</span>
                        <h2 class="mt-3 fw-bold mb-0" th:text="${dashboard.totalOrders}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 col-md-6 col-sm-12">
                <div class="card border-light h-100">
                    <div class="card-body">
                        <span class="fs-6 text-uppercase fw-semi-bold text-muted">Total Revenue</span>
                        <h2 class="mt-3 fw-bold mb-0" th:text="${#numbers.formatDecimal(dashboard.totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' VND'">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4 card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Quick Actions</h5>
            </div>
            <div class="card-body">
                <a class="btn btn-primary" th:href="@{/admin/instructors}">
                    <i class="bi bi-person-plus"></i> Manage Instructor Accounts
                </a>
            </div>
        </div>
    </div>
</div>

<footer class="py-4 bg-white border-top text-center small text-muted">
    <div class="container">©2026 Edutree Admin Panel</div>
</footer>

<script th:src="@{/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

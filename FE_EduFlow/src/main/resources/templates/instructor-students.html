<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" th:href="@{/img/icon.png}">
    <title>Students - Edutree Instructor</title>

    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/vendor/icofont/icofont.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/cdn.jsdelivr.net/npm/bootstrap-icons%401.7.1/font/bootstrap-icons.css}">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: instructor_header}"></div>

<section class="py-3 border-bottom bg-white shadow-sm">
    <div class="container">
        <h4 class="mb-0">Students</h4>
        <p class="text-muted mb-0">Học viên đã đăng ký các khóa học của bạn</p>
    </div>
</section>

<div class="pt-5 pb-5">
    <div class="container">
        <div class="card border-light">
            <div class="p-0 card-body">
                <div class="table-responsive border-0">
                    <table class="mb-0 text-nowrap table">
                        <thead class="table-light">
                        <tr>
                            <th scope="col" class="border-0">Full Name</th>
                            <th scope="col" class="border-0">Email</th>
                            <th scope="col" class="border-0">Enrolled Courses</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${students.isEmpty()}">
                            <td colspan="3" class="text-center text-muted py-5">Chưa có học viên nào đăng ký khóa học của bạn.</td>
                        </tr>
                        <tr th:each="student : ${students}">
                            <td th:text="${student.fullName}">Full name</td>
                            <td th:text="${student.email}">email</td>
                            <td>
                                <span class="badge bg-secondary me-1" th:each="courseName : ${student.enrolledCourseNames}" th:text="${courseName}">Course</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="py-4 bg-white border-top text-center small text-muted">
    <div class="container">©2026 Edutree Instructor Panel</div>
</footer>

<script th:src="@{/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" th:href="@{/img/icon.png}">
    <title>Course Form - Edutree Instructor</title>

    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/vendor/icofont/icofont.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/cdn.jsdelivr.net/npm/bootstrap-icons%401.7.1/font/bootstrap-icons.css}">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: instructor_header}"></div>

<section class="py-3 border-bottom bg-white shadow-sm">
    <div class="container">
        <h4 class="mb-0" th:text="${course.courseId != null and !course.courseId.isEmpty()} ? 'Edit Course' : 'New Course'">New Course</h4>
        <p class="text-muted mb-0">Thông tin cơ bản của khóa học</p>
    </div>
</section>

<div class="pt-5 pb-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-light">
                    <div class="card-body">
                        <form th:action="@{/instructor/courses/add}" method="POST" th:object="${course}">
                            <input type="hidden" th:field="*{courseId}">

                            <div class="mb-3">
                                <label class="form-label">Tên khóa học</label>
                                <input type="text" class="form-control" th:field="*{courseName}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mô tả</label>
                                <textarea rows="3" class="form-control" th:field="*{description}"></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Ảnh (URL)</label>
                                    <input type="text" class="form-control" th:field="*{image}" placeholder="/img/globel/b1.jpg">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Thumbnail (URL)</label>
                                    <input type="text" class="form-control" th:field="*{thumbnail}" placeholder="/img/globel/b1.jpg">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Ngày bắt đầu</label>
                                    <input type="date" class="form-control" th:field="*{startDate}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Ngày kết thúc</label>
                                    <input type="date" class="form-control" th:field="*{endDate}">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Trạng thái</label>
                                    <select class="form-select" th:field="*{status}">
                                        <option value="ACTIVE">Active</option>
                                        <option value="INACTIVE">Inactive</option>
                                        <option value="DRAFT">Draft</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Giá (VND)</label>
                                    <input type="number" step="1000" min="0" class="form-control" th:field="*{price}">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Lưu khóa học</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="py-4 bg-white border-top text-center small text-muted">
    <div class="container">©2026 Edutree Instructor Panel</div>
</footer>

<script th:src="@{/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

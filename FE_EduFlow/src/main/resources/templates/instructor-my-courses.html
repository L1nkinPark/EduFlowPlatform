<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" th:href="@{/img/icon.png}">
    <title>My Courses - Edutree Instructor</title>

    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/vendor/icofont/icofont.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/cdn.jsdelivr.net/npm/bootstrap-icons%401.7.1/font/bootstrap-icons.css}">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: instructor_header}"></div>

<section class="py-3 border-bottom bg-white shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h4 class="mb-0">My Courses</h4>
            <p class="text-muted mb-0">Các khóa học của bạn</p>
        </div>
        <a class="btn btn-primary" th:href="@{/instructor/courses/add}">
            <i class="bi bi-plus-lg"></i> New Course
        </a>
    </div>
</section>

<div class="pt-5 pb-5">
    <div class="container">
        <div class="card border-light">
            <div class="p-0 card-body">
                <div class="table-responsive border-0">
                    <table class="mb-0 text-nowrap table">
                        <thead class="table-light">
                        <tr>
                            <th scope="col" class="border-0">Course</th>
                            <th scope="col" class="border-0">Price</th>
                            <th scope="col" class="border-0">Chapters</th>
                            <th scope="col" class="border-0">Status</th>
                            <th scope="col" class="border-0">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${courseList.isEmpty()}">
                            <td colspan="5" class="text-center text-muted py-5">
                                Bạn chưa có khóa học nào. <a th:href="@{/instructor/courses/add}">Tạo khóa học đầu tiên</a>
                            </td>
                        </tr>
                        <tr th:each="course : ${courseList}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <img th:src="${course.thumbnail}" class="rounded img-4by3-sm" style="width:60px;height:45px;object-fit:cover;" onerror="this.style.display='none'">
                                    <h5 class="mb-0 ms-3" th:text="${course.courseName}">Course name</h5>
                                </div>
                            </td>
                            <td th:text="${course.price} + ' VND'">0</td>
                            <td th:text="${course.chapters != null ? course.chapters.size() : 0}">0</td>
                            <td>
                                <span class="badge bg-success" th:text="${course.status}">ACTIVE</span>
                            </td>
                            <td>
                                <a class="btn btn-sm btn-outline-primary" th:href="@{/instructor/courses/content(courseId=${course.courseId})}">
                                    <i class="bi bi-collection-play"></i> Manage Content
                                </a>
                                <a class="btn btn-sm btn-outline-secondary" th:href="@{/instructor/courses/add(courseId=${course.courseId})}">
                                    Edit
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="py-4 bg-white border-top text-center small text-muted">
    <div class="container">©2026 Edutree Instructor Panel</div>
</footer>

<script th:src="@{/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

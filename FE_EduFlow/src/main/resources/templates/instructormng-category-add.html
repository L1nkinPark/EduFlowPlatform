    <title>Edutree – Online Course & Education HTML5 Template</title>
    <meta name="description" content="Edutree" />
    <meta name="keywords" content="Edutree" />

    <link th:href="@{/css/style.css}" rel="stylesheet">

    <link th:href="@{/vendor/slick/slick/slick.css}" rel="stylesheet">

</head>

<body class="bg-light">
<div th:replace="~{layouts/layout :: header_2}"></div>
<section class="bg-primary py-5 profile-header">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="d-flex gap-3 align-items-center">
                    <img th:src="@{/img/globel/emoji.jpg}" class="img-fluid rounded-circle col-1 bg-white p-2"
                         alt="...">
                    <div>
                        <div class="p-0">
                            <h3 class="card-title text-white mb-0">Abhay Rai</h3>
                            <p class="card-text fs-6 text-white-50 mb-1">@askbootstrap</p>
                            <p class="card-text text-white">
                                <i class="bi bi-geo-alt"></i>
                                Sevilla, Spain
                            </p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>

<div class="container mb-5">
    <div class="row d-flex justify-content-center">
        <div class="col-md-12 mt-5">
            <h3 class="text-center">Course Form</h3>
            <hr>
        </div>

        <div class="col-md-8 mt-3">
            <div class="card">
                <div class="card-body">
                    <form action="/instructor/category/add" method="POST" th:object="${category}">
                        <div class="form-group">
                            <div class="row">
                                <div class="col-md-6">
                                    <label>#ID</label>
                                    <input type="text" class="form-control" th:field="*{categoryId}" readonly>
                                    <p class="text-danger">Error</p>
                                </div>
                        </div>

                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" name="name" class="form-control" th:field="*{categoryName}">
                            <p class="text-danger">Error</p>
                        </div>

                        <div class="form-group">
                            <label>Description</label>
                            <textarea type="text" rows="3" class="form-control" name="description" th:field="*{categoryDescription}"></textarea>
                            <p class="text-danger">Error</p>
                        </div>



                        <div class="form-group">
                            <label>Status</label>
                            <select class="form-control" style="width: 100%;"
                                    th:field="*{status}">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                            <p class="text-danger">Error</p>
                        </div>



                        <button type="submit" class="btn btn-success">Save</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>





<div th:replace="~{layouts/layout :: footer}"></div>

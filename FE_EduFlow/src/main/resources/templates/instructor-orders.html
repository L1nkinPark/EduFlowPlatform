<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" th:href="@{/img/icon.png}">
    <title>Orders - Edutree Instructor</title>

    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/vendor/icofont/icofont.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/cdn.jsdelivr.net/npm/bootstrap-icons%401.7.1/font/bootstrap-icons.css}">
</head>
<body class="bg-light">
<div th:replace="~{layouts/layout :: instructor_header}"></div>

<section class="py-3 border-bottom bg-white shadow-sm">
    <div class="container">
        <h4 class="mb-0">Orders</h4>
        <p class="text-muted mb-0">Danh sách đơn hàng của các khóa học bạn giảng dạy</p>
    </div>
</section>

<div class="pt-5 pb-5">
    <div class="container">
        <div class="card border-light">
            <div class="p-0 card-body">
                <div class="table-responsive border-0">
                    <table class="mb-0 text-nowrap table">
                        <thead class="table-light">
                        <tr>
                            <th scope="col" class="border-0">Order ID</th>
                            <th scope="col" class="border-0">Course</th>
                            <th scope="col" class="border-0">Student</th>
                            <th scope="col" class="border-0">Amount</th>
                            <th scope="col" class="border-0">Date</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${orders.isEmpty()}">
                            <td colspan="5" class="text-center text-muted py-5">Chưa có đơn hàng nào.</td>
                        </tr>
                        <tr th:each="order : ${orders}">
                            <td th:text="'#' + ${order.orderId}">#1</td>
                            <td th:text="${order.courseName}">Course name</td>
                            <td>
                                <div th:text="${order.studentName}">Student name</div>
                                <small class="text-muted" th:text="${order.studentEmail}">email</small>
                            </td>
                            <td th:text="${#numbers.formatDecimal(order.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</td>
                            <td th:text="${#dates.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">Date</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="py-4 bg-white border-top text-center small text-muted">
    <div class="container">©2026 Edutree Instructor Panel</div>
</footer>

<script th:src="@{/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
